<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu projeto Web</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        div.card-group {
            width: 800px;
            margin: auto;
        }
    </style>

</head>

<body>

    <nav class="navbar navbar-expand-lg bg-light">
        <div class="container-fluid">

            <a class="navbar-brand" href="#">Meu Site</a>

            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link active" href="index.html">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="produtos.html">Produtos</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="carrinho.html">Carrinho</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="contato.html">Contato</a>
                </li>

            </ul>

        </div>
    </nav>

    <div class="card-group">

        <div class="card">
            <img src="imagens/caneta.jpg" class="card-img-top">

            <div class="card-body">

                <h5 class="card-title">Caneta Esferográfica Azul</h5>

                <p class="card-text">Caneta azul para uso diário.</p>

                <div class="form-check mb-2">
                    <input class="form-check-input item-produto" type="checkbox" value="10.00">
                    <label class="form-check-label">Selecionar produto</label>
                </div>

                <label class="form-label">Quantidade:</label>
                <input type="number" class="form-control qtd-produto" value="1" min="1">

            </div>
        </div>


        <div class="card">
            <img src="imagens/caneca.jpg" class="card-img-top">

            <div class="card-body">

                <h5 class="card-title">Caneca de Cerâmica Branca</h5>

                <p class="card-text">Caneca branca resistente.</p>

                <div class="form-check mb-2">
                    <input class="form-check-input item-produto" type="checkbox" value="50.00">
                    <label class="form-check-label">Selecionar produto</label>
                </div>

                <label class="form-label">Quantidade:</label>
                <input type="number" class="form-control qtd-produto" value="1" min="1">

            </div>
        </div>


        <div class="card">
            <img src="imagens/caderno.jpg" class="card-img-top">

            <div class="card-body">

                <h5 class="card-title">Caderno Universitário 10 Matérias</h5>

                <p class="card-text">Caderno grande para estudos.</p>

                <div class="form-check mb-2">
                    <input class="form-check-input item-produto" type="checkbox" value="30.00">
                    <label class="form-check-label">Selecionar produto</label>
                </div>

                <label class="form-label">Quantidade:</label>
                <input type="number" class="form-control qtd-produto" value="1" min="1">

            </div>
        </div>

    </div>


    <div class="container my-4">

        <div class="alert alert-info text-center">

            <h4>
                Valor Total: R$ <span id="valor-total">0,00</span>
            </h4>

        </div>

        <div class="text-center">

            <button id="btn-carrinho" class="btn btn-primary">
                Adicionar ao Carrinho
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
